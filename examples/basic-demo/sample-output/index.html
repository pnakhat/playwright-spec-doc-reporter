<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playwright Glossy AI Report — Glossy Test Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07090e;
      --bg2: #0d1018;
      --bg3: #141720;
      --bg4: #1b1f2a;
      --bg5: #222636;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.11);
      --border3: rgba(255,255,255,0.18);
      --text: #e8eaf0;
      --text1: #d0d4e0;
      --text2: #8b90a0;
      --text3: #5a5f72;
      --pass: #10b981;
      --fail: #ef4444;
      --skip: #6366f1;
      --flaky: #f59e0b;
      --accent: #818cf8;
      --accent2: #6366f1;
      --accent-glow: rgba(99,102,241,0.18);
      --radius: 14px;
      --radius-sm: 10px;
      --radius-xs: 7px;
      --shadow: 0 1px 4px rgba(0,0,0,0.4), 0 6px 20px rgba(0,0,0,0.2);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.45);
      --font: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', Consolas, monospace;
      --ease: 0.15s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: 'cv11', 'ss01';
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border3); }

    /* ─── Topbar ─── */
    .topbar {
      background: rgba(13,16,24,0.97);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 54px;
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
    }
    .topbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 0.9rem; letter-spacing: -0.02em; }
    .topbar-logo {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      box-shadow: 0 2px 12px rgba(99,102,241,0.45);
    }
    .topbar-right { display: flex; align-items: center; gap: 0.75rem; }
    .topbar-meta { font-size: 0.72rem; color: var(--text2); display: flex; gap: 1.1rem; align-items: center; }
    .topbar-meta-item { display: flex; align-items: center; gap: 4px; }

    .btn-sm {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 7px;
      border: 1px solid var(--border2);
      background: var(--bg3); color: var(--text2);
      font-size: 0.72rem; font-weight: 600; cursor: pointer;
      transition: all var(--ease);
      font-family: var(--font);
    }
    .btn-sm:hover { border-color: var(--accent); color: var(--text); background: var(--bg4); }
    .btn-sm.btn-accent { background: var(--accent2); color: #fff; border-color: var(--accent2); }
    .btn-sm.btn-accent:hover { background: var(--accent); border-color: var(--accent); }

    /* ─── Failure banner ─── */
    .failure-banner {
      background: linear-gradient(135deg, rgba(239,68,68,0.11), rgba(239,68,68,0.05));
      border-bottom: 1px solid rgba(239,68,68,0.18);
      padding: 0.45rem 1.5rem;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .failure-banner.visible { display: flex; }
    .failure-banner-msg { color: #fca5a5; display: flex; align-items: center; gap: 7px; font-size: 0.81rem; font-weight: 600; }
    .failure-banner-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 12px; border-radius: 999px;
      background: rgba(239,68,68,0.18); color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.28);
      font-size: 0.73rem; font-weight: 700; cursor: pointer;
      transition: all var(--ease); font-family: var(--font);
    }
    .failure-banner-btn:hover { background: rgba(239,68,68,0.32); border-color: rgba(239,68,68,0.5); }

    /* ─── Container ─── */
    .container { max-width: 1340px; margin: 0 auto; padding: 1.4rem 1.75rem; }

    /* ─── Hero ─── */
    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 2rem;
      align-items: start;
      margin-bottom: 0.85rem;
      padding: 1.75rem 2rem 1.6rem;
      background: var(--bg2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 80% 25%, rgba(99,102,241,0.14) 0%, transparent 55%),
        radial-gradient(ellipse at 10% 85%, rgba(16,185,129,0.07) 0%, transparent 45%);
      pointer-events: none;
    }
    .hero-left { position: relative; }
    .hero-title {
      font-size: 1.8rem; font-weight: 900; letter-spacing: -0.04em; line-height: 1.15;
      background: linear-gradient(135deg, #e8eaf0 20%, #818cf8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-subtitle { color: var(--text2); font-size: 0.79rem; margin-top: 0.4rem; }
    .hero-status {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 100px;
      font-size: 0.71rem; font-weight: 700; margin-top: 0.7rem;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .status-passed { background: rgba(16,185,129,0.14); color: var(--pass); border: 1px solid rgba(16,185,129,0.28); }
    .status-failed { background: rgba(239,68,68,0.14); color: var(--fail); border: 1px solid rgba(239,68,68,0.28); }
    .status-interrupted { background: rgba(245,158,11,0.14); color: var(--flaky); border: 1px solid rgba(245,158,11,0.28); }

    .env-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 0.9rem; }
    .env-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 9px; border-radius: 999px;
      font-size: 0.67rem; font-weight: 600;
      background: var(--bg3); border: 1px solid var(--border2); color: var(--text2);
    }

    /* ─── Donut ─── */
    .donut-wrap { position: relative; width: 130px; height: 130px; flex-shrink: 0; }
    .donut-wrap svg { transform: rotate(-90deg); }
    .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .donut-pct { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.06em; line-height: 1; }
    .donut-label { font-size: 0.63rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

    /* ─── Progress bar ─── */
    .progress-section { margin-bottom: 0.85rem; }
    .progress-stack {
      height: 6px; border-radius: 999px; overflow: hidden;
      background: var(--bg3); display: flex; gap: 1px;
    }
    .progress-seg { height: 100%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .progress-seg-pass { background: var(--pass); }
    .progress-seg-fail { background: var(--fail); }
    .progress-seg-skip { background: var(--skip); }
    .progress-seg-flaky { background: var(--flaky); }
    .progress-labels { display: flex; gap: 1rem; margin-top: 0.45rem; flex-wrap: wrap; }
    .progress-label { display: flex; align-items: center; gap: 5px; font-size: 0.67rem; color: var(--text2); }
    .progress-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ─── Stats grid ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(138px, 1fr));
      gap: 0.55rem;
      margin-bottom: 0.85rem;
    }
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      display: flex; flex-direction: column; gap: 3px;
      position: relative; overflow: hidden;
      box-shadow: var(--shadow);
      transition: border-color var(--ease), transform var(--ease), box-shadow var(--ease);
      cursor: default;
    }
    .stat-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .stat-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; }
    .stat-card.stat-pass::after { background: var(--pass); }
    .stat-card.stat-fail::after { background: var(--fail); }
    .stat-card.stat-skip::after { background: var(--skip); }
    .stat-card.stat-flaky::after { background: var(--flaky); }
    .stat-card.stat-duration::after { background: var(--accent); }
    .stat-card.stat-total::after { background: var(--border3); }
    .stat-icon { font-size: 1rem; margin-bottom: 1px; line-height: 1; }
    .stat-value { font-size: 2.1rem; font-weight: 900; letter-spacing: -0.06em; line-height: 1; font-variant-numeric: tabular-nums; }
    .stat-label { font-size: 0.68rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }

    /* ─── Section ─── */
    .section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.85rem;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .section-header {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    }
    .section-title { font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .section-actions { display: flex; align-items: center; gap: 5px; }

    /* ─── Tabs ─── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 1rem;
      background: linear-gradient(180deg, var(--bg3) 0%, var(--bg2) 100%);
      overflow-x: auto; scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 0.68rem 1rem;
      font-size: 0.78rem; font-weight: 600;
      color: var(--text3);
      background: none; border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer; white-space: nowrap;
      margin-bottom: -1px;
      display: flex; align-items: center; gap: 6px;
      transition: color var(--ease);
      font-family: var(--font);
    }
    .tab-btn:hover { color: var(--text2); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-count {
      background: var(--bg4); color: var(--text3);
      font-size: 0.65rem; padding: 1px 7px;
      border-radius: 100px; font-weight: 700;
      transition: all var(--ease);
    }
    .tab-btn.active .tab-count { background: var(--accent-glow); color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ─── Filter bar ─── */
    .filter-bar {
      padding: 0.6rem 1rem;
      display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      position: sticky; top: 54px; z-index: 10;
    }
    .search-wrap { position: relative; flex: 1; min-width: 190px; }
    .search-icon { position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 0.78rem; pointer-events: none; }
    .search-input {
      width: 100%;
      padding: 0.38rem 0.65rem 0.38rem 2rem;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text); font-size: 0.82rem; font-family: var(--font);
      transition: border-color var(--ease); outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text3); }
    .filter-group { display: flex; gap: 3px; }
    .filter-btn {
      padding: 0.26rem 0.68rem;
      border-radius: 100px;
      border: 1px solid var(--border2);
      background: var(--bg3); color: var(--text2);
      font-size: 0.74rem; font-weight: 600; cursor: pointer;
      transition: all var(--ease); font-family: var(--font); white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--border3); color: var(--text); }
    .filter-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
    .filter-divider { width: 1px; background: var(--border); margin: 0 2px; align-self: stretch; }

    /* ─── Suite blocks ─── */
    .suites-container { padding: 0.65rem; display: flex; flex-direction: column; gap: 0.4rem; }
    .suite-block {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden; background: var(--bg3);
      transition: border-color var(--ease);
    }
    .suite-block:hover { border-color: var(--border2); }
    .suite-block.suite-failed { border-left: 3px solid var(--fail); }
    .suite-block.suite-passed { border-left: 3px solid var(--pass); }
    .suite-header {
      padding: 0.62rem 0.9rem;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; gap: 0.75rem; user-select: none;
    }
    .suite-header:hover { background: rgba(255,255,255,0.025); }
    .suite-header-left { display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1; }
    .suite-header-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .suite-toggle { font-size: 0.58rem; color: var(--text3); transition: transform 0.2s ease; display: inline-flex; flex-shrink: 0; }
    .suite-toggle.open { transform: rotate(90deg); }
    .suite-name { font-weight: 700; font-size: 0.84rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .suite-file { color: var(--text3); font-size: 0.68rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--font-mono); margin-top: 1px; }
    .suite-body { display: none; border-top: 1px solid var(--border); }
    .suite-body.open { display: block; animation: fadeIn 0.14s ease; }

    @keyframes fadeIn { from { opacity: 0.5; transform: translateY(-2px); } to { opacity: 1; transform: translateY(0); } }

    /* ─── Badges ─── */
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 100px; font-size: 0.66rem; font-weight: 700; white-space: nowrap; }
    .badge-pass { background: rgba(16,185,129,0.14); color: var(--pass); }
    .badge-fail { background: rgba(239,68,68,0.14); color: var(--fail); }
    .badge-skip { background: rgba(99,102,241,0.14); color: var(--skip); }
    .badge-flaky { background: rgba(245,158,11,0.14); color: var(--flaky); }
    .badge-neutral { background: var(--bg4); color: var(--text2); }

    /* ─── Status icons ─── */
    .status-icon { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; font-size: 0.61rem; font-weight: 800; flex-shrink: 0; }
    .status-passed-icon { background: rgba(16,185,129,0.14); color: var(--pass); }
    .status-failed-icon { background: rgba(239,68,68,0.14); color: var(--fail); }
    .status-skipped-icon { background: rgba(99,102,241,0.14); color: var(--skip); }

    /* ─── Test detail ─── */
    .test-detail-block { padding: 0.6rem 0.9rem; border-top: 1px solid var(--border); }
    .test-detail-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; padding: 0.42rem 0.6rem; border-radius: var(--radius-xs);
      transition: background var(--ease);
    }
    .test-detail-header:hover { background: rgba(255,255,255,0.04); }
    .test-detail-body { display: none; padding: 0.4rem 0.2rem 0.1rem; }
    .test-detail-body.open { display: block; animation: fadeIn 0.1s ease; }
    .video-section { margin-top: 0.6rem; }

    /* ─── Error display ─── */
    .test-error {
      margin-top: 0.4rem; padding: 0.5rem 0.7rem;
      background: rgba(239,68,68,0.07); border-radius: var(--radius-xs);
      border-left: 2px solid var(--fail); position: relative;
    }
    .test-error pre { font-size: 0.7rem; color: #fca5a5; white-space: pre-wrap; word-break: break-word; font-family: var(--font-mono); line-height: 1.65; }
    .copy-btn {
      position: absolute; top: 0.38rem; right: 0.38rem;
      padding: 2px 8px; border-radius: 4px;
      border: 1px solid rgba(239,68,68,0.28); background: rgba(239,68,68,0.1);
      color: #fca5a5; font-size: 0.62rem; font-weight: 700; cursor: pointer;
      transition: all var(--ease); font-family: var(--font);
    }
    .copy-btn:hover { background: rgba(239,68,68,0.22); border-color: rgba(239,68,68,0.45); }
    .copy-btn.copied { border-color: rgba(16,185,129,0.35); background: rgba(16,185,129,0.1); color: var(--pass); }

    /* ─── Code snippet ─── */
    .code-snippet {
      margin-top: 0.45rem;
      background: #0b0e15; border-radius: var(--radius-xs);
      overflow-x: auto; font-family: var(--font-mono); font-size: 0.72rem; line-height: 1.7;
      border: 1px solid var(--border2);
    }
    .code-snippet-file { padding: 0.28rem 0.75rem; font-size: 0.66rem; color: var(--text3); border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
    .code-snippet-lines { padding: 0.2rem 0; }
    .code-line { display: flex; padding: 0 0.75rem; }
    .code-line.error-line { background: rgba(239,68,68,0.11); }
    .code-line-num { width: 38px; flex-shrink: 0; text-align: right; padding-right: 12px; color: var(--text3); user-select: none; }
    .code-line-marker { width: 16px; flex-shrink: 0; color: var(--fail); font-weight: 700; }
    .code-line-text { flex: 1; white-space: pre; color: #c9d7e8; }

    .healing-md-pre { display:none; font-size:0.7rem; background:#0d1117; padding:0.75rem 1rem; border-radius:6px; border:1px solid var(--border); color:#c9d1d9; white-space:pre-wrap; word-break:break-word; max-height:500px; overflow-y:auto; font-family:var(--font-mono); line-height:1.6; }

    /* ─── Artifacts ─── */
    .artifact-grid { margin-top: 0.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.5rem; }
    .artifact-card { border: 1px solid var(--border2); border-radius: var(--radius-xs); overflow: hidden; background: rgba(0,0,0,0.22); }
    .artifact-label { padding: 0.28rem 0.5rem; font-size: 0.67rem; color: var(--text2); border-bottom: 1px solid var(--border); font-weight: 600; }
    .artifact-card img { width: 100%; display: block; max-height: 220px; object-fit: contain; background: #080a0f; cursor: zoom-in; transition: opacity var(--ease); }
    .artifact-card img:hover { opacity: 0.88; }
    .artifact-card video { width: 100%; display: block; max-height: 240px; background: #000; }
    .artifact-link { display: block; padding: 0.26rem 0.5rem; border-top: 1px solid var(--border); color: var(--text2); font-size: 0.68rem; text-decoration: none; transition: color var(--ease); }
    .artifact-link:hover { color: var(--accent); }
    .media-summary { margin-top: 0.4rem; font-size: 0.72rem; color: var(--text2); }
    .media-pill { display: inline-flex; align-items: center; margin-left: 5px; padding: 1px 6px; border-radius: 999px; background: var(--bg4); color: var(--text2); font-size: 0.65rem; font-weight: 600; }
    .screenshot-toggle { margin-top: 0.4rem; font-size: 0.72rem; padding: 0.26rem 0.65rem; border-radius: 999px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all var(--ease); font-family: var(--font); }
    .screenshot-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .screenshot-gallery { display: none; margin-top: 0.45rem; }
    .screenshot-gallery.open { display: block; }

    /* ─── Steps ─── */
    .steps-section { margin-top: 0.55rem; }
    .steps-table { width: 100%; border-collapse: collapse; font-size: 0.77rem; }
    .steps-table th { text-align: left; padding: 0.28rem 0.55rem; color: var(--text3); font-weight: 700; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.07em; border-bottom: 1px solid var(--border); }
    .steps-table td { padding: 0.3rem 0.55rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    .step-status { display: inline-flex; align-items: center; justify-content: center; width: 17px; height: 17px; border-radius: 50%; font-size: 0.57rem; font-weight: 800; }
    .step-title-text { display: block; }
    .step-category { display: inline-block; font-size: 0.63rem; color: var(--text3); padding: 0 5px; border-radius: 3px; background: var(--border); margin-left: 5px; }
    .step-error { margin-top: 0.28rem; padding: 0.26rem 0.45rem; background: rgba(239,68,68,0.07); border-radius: 4px; border-left: 2px solid var(--fail); font-size: 0.7rem; color: #fca5a5; white-space: pre-wrap; word-break: break-word; font-family: var(--font-mono); }

    var p = String(rawPath || '');
    if (!p) return '';
    if (p.startsWith('http://') || p.startsWith('https://')) return p;
    var n = p.replace(/\\/g, '/');
    if (n.startsWith('./') || n.startsWith('../') || !n.startsWith('/')) return n;
    var idx = n.indexOf('/test-results/');
    if (idx >= 0) return '..' + n.slice(idx);
    return n;
  }

  function renderCodeSnippet(snippet) {
    if (!snippet || !snippet.lines || snippet.lines.length === 0) return '';
    var linesHtml = snippet.lines.map(function(l) {
      return '<div class="code-line' + (l.isError ? ' error-line' : '') + '">' +
        '<span class="code-line-num">' + l.num + '</span>' +
        '<span class="code-line-marker">' + (l.isError ? '>' : ' ') + '</span>' +
        '<span class="code-line-text">' + escHtml(l.text) + '</span>' +
        '</div>';
    }).join('');
    return '<div class="code-snippet">' +
      '<div class="code-snippet-file">' + escHtml(snippet.file) + ':' + snippet.line + ':' + snippet.column + '</div>' +
      '<div class="code-snippet-lines">' + linesHtml + '</div>' +
      '</div>';
  }

  function formatMs(ms) {
    if (!Number.isFinite(ms)) return "0ms";
    if (ms < 1000) return ms + "ms";
    const s = ms / 1000;
    if (s < 60) return s.toFixed(1) + "s";
    const m = Math.floor(s / 60);
    return m + "m " + Math.round(s % 60) + "s";
  }

  function passPercent() {
    if (!summary.total) return 0;
    return Math.round(((summary.passed || 0) / summary.total) * 100);
  }

  function overallStatus() {
    if ((summary.failed || 0) > 0 || (summary.timedOut || 0) > 0) return "failed";
    if ((summary.interrupted || 0) > 0) return "interrupted";
    return "passed";
  }

  function statusClass(s) {
    if (s === "passed") return "status-passed-icon";
    if (s === "skipped") return "status-skipped-icon";
    return "status-failed-icon";
  }

  function statusSymbol(s) {
    if (s === "passed") return "✓";
    if (s === "skipped") return "–";
    return "✗";
  }

  function suiteKey(t) { return t.file || t.suite || "unknown"; }
  function suiteTitle(t) { return t.suite || (t.file ? t.file.split("/").pop() : "Unnamed Suite"); }

  function testScope(t) {
    const f = String(t.file || "").toLowerCase();
    if (f.includes('/api/') || f.includes('\\api\\')) return 'api';
    if (f.includes('/ui/') || f.includes('\\ui\\')) return 'ui';
    return 'other';
  }

  function buildSuiteMap(src) {
    const map = new Map();
    for (const t of src) {
      const key = suiteKey(t);
      const cur = map.get(key) || { key, name: suiteTitle(t), file: t.file || "", tests: [] };
      cur.tests.push(t);
      map.set(key, cur);
    }
    return Array.from(map.values());
  }

  /**
   * BDD Hierarchy Builder
   * Maps: spec file / describe() → Feature, test() → Scenario, test.step() → Step
   */
  function extractFeatureName(test) {
    var fullName = test.fullName || '';
    var parts = fullName.split(' › ').filter(Boolean);
    // parts: [project, file, ...describes, testTitle]
    // Feature = describes joined with " > ", or filename without extension
    if (parts.length > 2) {
      // Remove first (project) and last (test title)
      var middle = parts.slice(1, -1);
      // If first middle part looks like a file path, extract meaningful name
      if (middle.length > 0 && (middle[0].endsWith('.spec.ts') || middle[0].endsWith('.spec.js') || middle[0].endsWith('.test.ts') || middle[0].endsWith('.test.js'))) {
        var fileName = middle[0].split('/').pop().replace(/.(spec|test).(ts|js|mjs)$/, '');
        if (middle.length > 1) {
          // Has describe blocks: use describes
          return middle.slice(1).join(' > ');
        }
        return fileName;
      }
      // No file-like part — concatenate all middle segments
      return middle.join(' > ');
    }
    // Fallback
    var suite = test.suite || '';
    if (suite) return suite;
    return (test.file || 'unknown').split('/').pop().replace(/.(spec|test).(ts|js|mjs)$/, '');
  }

  function buildBddHierarchy(sourceTests) {
    var featureMap = new Map();
    for (var i = 0; i < sourceTests.length; i++) {
      var test = sourceTests[i];
      var featureName = extractFeatureName(test);
      var featureKey = (test.file || '') + '::' + featureName;
      if (!featureMap.has(featureKey)) {
        featureMap.set(featureKey, {
          name: featureName,
          file: test.file || '',
          status: 'passed',
          duration: 0,
          scenarios: [],
          tests: [] // keep raw tests for rendering
        });
      }
      var feature = featureMap.get(featureKey);
      var ns = test.status === 'timedOut' ? 'failed' : test.status;
      var scenario = {
        name: test.title || test.fullName,
        status: ns,
        duration: test.durationMs || 0,
        retries: test.retries || 0,
        steps: (test.steps || []).map(function(step) {
          return { name: step.title, status: step.status, duration: step.durationMs || 0, error: step.error || null, category: step.category };
        }),
        test: test // reference for detail rendering
      };
      // If no steps recorded, generate synthetic step from error
      if (scenario.steps.length === 0 && ns === 'failed' && test.errorMessage) {
        scenario.steps.push({ name: 'Test execution', status: 'failed', duration: test.durationMs || 0, error: test.errorMessage, category: 'test' });
      } else if (scenario.steps.length === 0 && ns === 'passed') {
        scenario.steps.push({ name: 'Test execution', status: 'passed', duration: test.durationMs || 0, error: null, category: 'test' });
      }
      feature.scenarios.push(scenario);
      feature.tests.push(test);
      feature.duration += (test.durationMs || 0);
      // Update feature status
      if (ns === 'failed') feature.status = 'failed';
      else if (ns === 'skipped' && feature.status !== 'failed') {
        var allSkipped = feature.scenarios.every(function(s) { return s.status === 'skipped'; });
        if (allSkipped) feature.status = 'skipped';
      }
    }
    return Array.from(featureMap.values());
  }

  function getBddSummary(features) {
    var totalFeatures = features.length;
    var totalScenarios = 0, totalSteps = 0;
    var passedS = 0, failedS = 0, skippedS = 0;
    for (var i = 0; i < features.length; i++) {
      var f = features[i];
      totalScenarios += f.scenarios.length;
      for (var j = 0; j < f.scenarios.length; j++) {
        var sc = f.scenarios[j];
        totalSteps += sc.steps.length;
        if (sc.status === 'passed') passedS++;
        else if (sc.status === 'failed') failedS++;
        else skippedS++;
      }
    }
    return { totalFeatures: totalFeatures, totalScenarios: totalScenarios, totalSteps: totalSteps, passed: passedS, failed: failedS, skipped: skippedS };
  }

  function renderBddSummary() {
    var features = buildBddHierarchy(tests);
    var s = getBddSummary(features);
    document.getElementById('bdd-summary').innerHTML =
      '<div class="bdd-summary-item"><span class="bdd-label bdd-feature">Feature</span> <span class="bdd-summary-value">' + s.totalFeatures + '</span></div>' +
      '<div class="bdd-summary-sep"></div>' +
      '<div class="bdd-summary-item"><span class="bdd-label bdd-scenario">Scenario</span> <span class="bdd-summary-value">' + s.totalScenarios + '</span>' +
        '<span style="font-size:0.68rem;color:var(--text3)">(' + s.passed + ' pass / ' + s.failed + ' fail / ' + s.skipped + ' skip)</span></div>' +
      '<div class="bdd-summary-sep"></div>' +
      '<div class="bdd-summary-item"><span class="bdd-label bdd-step">Step</span> <span class="bdd-summary-value">' + s.totalSteps + '</span></div>';
  }

  function sortByDurationDesc(arr) { return arr.slice().sort((a, b) => (b.durationMs || 0) - (a.durationMs || 0)); }

  function copyToClipboard(text, btn) {
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
    }).catch(function() {
      btn.textContent = 'Failed'; setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
    });
  }
  window.copyToClipboard = copyToClipboard;

  function renderArtifacts(test, options) {
    var opts = options || {};
    var screenshots = opts.includeScreenshots === false ? [] : ((test.artifacts && test.artifacts.screenshots) || []).slice(0, 2);
    var videos = opts.includeVideos === true ? ((test.artifacts && test.artifacts.videos) || []).slice(0, 1) : [];
    if (screenshots.length === 0 && videos.length === 0) return '';
    var mediaItems = Array.isArray(opts.mediaItems) ? opts.mediaItems
      : [...screenshots.map((src, i) => ({ type: 'image', src, label: 'Screenshot ' + (i + 1) })),
         ...videos.map((src, i) => ({ type: 'video', src, label: 'Video ' + (i + 1) }))];
    var galleryPayload = encodeURIComponent(JSON.stringify(mediaItems));
    var ssHtml = screenshots.map((p, i) =>
      '<div class="artifact-card"><div class="artifact-label">Screenshot ' + (i + 1) + '</div>' +
      '<img class="js-screenshot-thumb" onclick="openScreenshotGalleryFromEl(this)" data-gallery-items="' + galleryPayload + '" data-gallery-index="' + i + '" src="' + escHtml(normalizeMediaPath(p)) + '" alt="screenshot" loading="lazy" /></div>'
    ).join('');
    var vidHtml = videos.map((p, i) =>
      '<div class="artifact-card"><div class="artifact-label">Video ' + (i + 1) + '</div>' +
      '<video controls preload="metadata" src="' + escHtml(normalizeMediaPath(p)) + '"></video>' +
      '<a class="artifact-link" href="' + escHtml(normalizeMediaPath(p)) + '" target="_blank" rel="noreferrer">Open in new tab ↗</a></div>'
    ).join('');
    return '<div class="artifact-grid">' + ssHtml + vidHtml + '</div>';
  }

  function renderTestLevelArtifacts(test, galleryId) {
    var key = String((test.file || '') + '::' + (test.fullName || test.title || ''));
    var combined = combinedArtifactsByTest[key] || { screenshots: [], videos: [] };
    var ss = combined.screenshots, vids = combined.videos;
    if (ss.length === 0 && vids.length === 0) return '';
    var mediaItems = [...ss.map((src, i) => ({ type: 'image', src, label: 'Screenshot ' + (i + 1) })),
                      ...vids.map((src, i) => ({ type: 'video', src, label: 'Video ' + (i + 1) }))];
    var previewHtml = renderArtifacts({ artifacts: { screenshots: ss.slice(0, 2), videos: vids } }, { includeScreenshots: true, includeVideos: true, mediaItems });
    var mediaSummary = '<div class="media-summary">Screenshots: ' + ss.length + (vids.length > 0 ? ' · Videos: ' + vids.length : '') + '</div>';
    if (ss.length === 0) return previewHtml + mediaSummary;
    var fullPayload = encodeURIComponent(JSON.stringify(mediaItems));
    var allSsHtml = ss.map((p, i) =>
      '<div class="artifact-card"><div class="artifact-label">Screenshot ' + (i + 1) + '</div>' +
      '<img class="js-screenshot-thumb" onclick="openScreenshotGalleryFromEl(this)" data-gallery-items="' + fullPayload + '" data-gallery-index="' + i + '" src="' + escHtml(normalizeMediaPath(p)) + '" alt="screenshot" loading="lazy" /></div>'
    ).join('');
    return previewHtml + mediaSummary +
      '<button class="screenshot-toggle" data-target="' + galleryId + '" onclick="toggleScreenshotGallery(this)">Show all screenshots (' + ss.length + ')</button>' +
      '<div class="artifact-grid screenshot-gallery" id="' + galleryId + '">' + allSsHtml + '</div>';
  }

  function renderTop() {
    document.getElementById("brand-title").textContent = report.title || "Playwright Suite";
    document.getElementById("meta-time").textContent = "🕐 " + new Date(report.generatedAt).toLocaleString();
    document.getElementById("meta-duration").textContent = "⏱ " + formatMs(summary.durationMs || 0);
    document.getElementById("hero-title").textContent = report.title || "Playwright Suite";
    document.getElementById("hero-subtitle").textContent = "Test Run · " + new Date(report.generatedAt).toLocaleString();

    const status = overallStatus();
    const heroStatus = document.getElementById("hero-status");
    heroStatus.className = "hero-status " + (status === "passed" ? "status-passed" : status === "failed" ? "status-failed" : "status-interrupted");
    heroStatus.textContent = status === "passed" ? "✓ All Passing" : status === "failed" ? "✗ Failures Detected" : "⚠ Interrupted";

    const failedCount = (summary.failed || 0) + (summary.timedOut || 0);
    if (failedCount > 0) {
      document.getElementById("failure-banner").classList.add("visible");
      document.getElementById("banner-msg").innerHTML = '⚡ ' + failedCount + ' test' + (failedCount > 1 ? 's' : '') + ' failed · ' + passPercent() + '% pass rate';
    }

    const pct = passPercent();
    document.getElementById("donut-pct").textContent = pct + "%";
    const circumference = 2 * Math.PI * 54;
    const donut = document.getElementById("donut-pass");
    donut.setAttribute("stroke-dasharray", String(circumference));
    donut.setAttribute("stroke-dashoffset", String(circumference - (pct / 100) * circumference));
    const color = pct >= 80 ? 'var(--pass)' : pct >= 50 ? 'var(--flaky)' : 'var(--fail)';
    donut.setAttribute("stroke", color);
    document.getElementById("donut-pct").style.color = color;
  }

  function renderEnvInfo() {
    const env = report.environment || {};
    const badges = [];
    if (env.nodeVersion) badges.push('⬡ Node ' + escHtml(env.nodeVersion));
    if (env.platform) badges.push('💻 ' + escHtml(env.platform));
    if (env.ci) badges.push('🔄 CI');
    if (summary.total) badges.push('🧪 ' + summary.total + ' tests');
    document.getElementById("env-row").innerHTML = badges.map(b => '<span class="env-badge">' + b + '</span>').join('');
  }

  function renderProgressBar() {
    const total = summary.total || 1;
    const passed = summary.passed || 0;
    const failed = (summary.failed || 0) + (summary.timedOut || 0);
    const skipped = summary.skipped || 0;
    const flaky = summary.flaky || 0;
    const pct = (n) => (n / total * 100).toFixed(2);
    document.getElementById("progress-stack").innerHTML =
      (passed > 0 ? '<div class="progress-seg progress-seg-pass" style="width:' + pct(passed) + '%"></div>' : '') +
      (failed > 0 ? '<div class="progress-seg progress-seg-fail" style="width:' + pct(failed) + '%"></div>' : '') +
      (skipped > 0 ? '<div class="progress-seg progress-seg-skip" style="width:' + pct(skipped) + '%"></div>' : '') +
      (flaky > 0 ? '<div class="progress-seg progress-seg-flaky" style="width:' + pct(flaky) + '%"></div>' : '');
    const labels = [];
    if (passed > 0) labels.push('<span class="progress-label"><span class="progress-dot" style="background:var(--pass)"></span>' + passed + ' passed</span>');
    if (failed > 0) labels.push('<span class="progress-label"><span class="progress-dot" style="background:var(--fail)"></span>' + failed + ' failed</span>');
    if (skipped > 0) labels.push('<span class="progress-label"><span class="progress-dot" style="background:var(--skip)"></span>' + skipped + ' skipped</span>');
    if (flaky > 0) labels.push('<span class="progress-label"><span class="progress-dot" style="background:var(--flaky)"></span>' + flaky + ' flaky</span>');
    document.getElementById("progress-labels").innerHTML = labels.join('');
  }

  function renderStats() {

      { klass: "stat-pass", icon: "✅", value: summary.passed || 0, label: "Passed" },
      { klass: "stat-fail", icon: "❌", value: (summary.failed || 0) + (summary.timedOut || 0), label: "Failed" },
      { klass: "stat-skip", icon: "⏭", value: summary.skipped || 0, label: "Skipped" },
      { klass: "stat-flaky", icon: "⚡", value: summary.flaky || 0, label: "Flaky" },
      { klass: "stat-duration", icon: "⏱", value: formatMs(summary.durationMs || 0), label: "Duration", small: true },

          '<span style="color:' + healthColor + ';font-weight:700">' + health + '/100</span>' +
        '</div>' +
      '</div>' +
      '<div class="ai-summary">AI analyzed <strong>' + aiAnalyses.length + ' failed test' + (aiAnalyses.length !== 1 ? 's' : '') + '</strong> — identified failure categories and remediation guidance.</div>' +
      '<div class="ai-grid">' +
        '<div class="ai-card"><div class="ai-card-title">🔍 Key Findings</div>' + (findingsHtml || '<div style="color:var(--text3);font-size:0.78rem">No findings categorized.</div>') + '</div>' +
        '<div class="ai-card"><div class="ai-card-title">🔧 Suggested Remediations</div>' + (remediations || '<div style="color:var(--text3);font-size:0.78rem">No remediations available.</div>') + '</div>' +

  function renderStepsTable(steps, testId) {
    if (!steps || steps.length === 0) return '<div style="padding:0.45rem 0;color:var(--text3);font-size:0.77rem">No steps recorded.</div>';

    steps.forEach(function(s, si) {
      (s.screenshots || []).forEach(function(src, idx) {

        var label = 'Screenshot ' + (i + 1);
        if (test.attachments) {
          var imgAtts = test.attachments.filter(function(a) { return a.contentType && a.contentType.indexOf('image') >= 0 && a.path; });
          if (imgAtts[i] && imgAtts[i].name && imgAtts[i].name !== 'screenshot') label = imgAtts[i].name;
        }
        return { type: 'image', src, label };
      });
      var allMedia = mediaItems.concat(combined.videos.map(function(src, i) { return { type: 'video', src, label: 'Video ' + (i + 1) }; }));
      var gp = encodeURIComponent(JSON.stringify(allMedia));
      var thumbs = combined.screenshots.map(function(src, i) {
        return '<div class="artifact-card"><div class="artifact-label">' + escHtml(mediaItems[i].label) + '</div>' +
          '<img class="js-screenshot-thumb" onclick="openScreenshotGalleryFromEl(this)" data-gallery-items="' + gp + '" data-gallery-index="' + i + '" src="' + escHtml(normalizeMediaPath(src)) + '" alt="' + escHtml(mediaItems[i].label) + '" loading="lazy" /></div>';
      }).join('');
      ssGalleryHtml = '<div style="margin-top:0.6rem"><div style="font-size:0.75rem;font-weight:700;color:var(--text2);margin-bottom:0.38rem">📷 Screenshots (' + combined.screenshots.length + ')</div><div class="artifact-grid">' + thumbs + '</div></div>';
    }

    var errorHtml = '';
    if (isFailed && test.errorMessage) {
      var safeErr = escHtml(test.errorMessage);
      errorHtml = '<div class="test-error"><button class="copy-btn" onclick="copyToClipboard(this.nextElementSibling.textContent, this)">Copy</button><pre>' + safeErr + '</pre></div>' + renderCodeSnippet(test.errorSnippet);
    }

    return '<div class="test-detail-block" data-status="' + ns + '" data-scope="' + testScope(test) + '">' +
      '<div class="test-detail-header" onclick="toggleTestDetail(this)">' +
        '<div style="display:flex;align-items:center;gap:7px;flex:1;min-width:0">' +
          '<span class="status-icon ' + statusClass(ns) + '">' + statusSymbol(ns) + '</span>' +
          '<span class="bdd-label bdd-scenario" style="margin-right:3px">Scenario</span>' +
          '<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.82rem;font-weight:600">' + escHtml(test.title || test.fullName) + '</span>' +
          (steps.length > 0 ? '<span class="media-pill">' + steps.length + ' steps</span>' : '') +
          (failedSteps > 0 ? '<span class="media-pill" style="background:rgba(239,68,68,0.14);color:var(--fail)">' + failedSteps + ' failed</span>' : '') +
          (combined.screenshots.length > 0 ? '<span class="media-pill">📷 ' + combined.screenshots.length + '</span>' : '') +
          (combined.videos.length > 0 ? '<span class="media-pill">🎬 ' + combined.videos.length + '</span>' : '') +
          (test.flaky ? '<span class="badge badge-flaky" style="margin-left:4px">flaky</span>' : '') +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:7px;flex-shrink:0">' +
          (test.browser || test.projectName ? '<span style="font-size:0.68rem;color:var(--text3);background:var(--bg4);padding:1px 7px;border-radius:4px">' + escHtml(test.browser || test.projectName) + '</span>' : '') +
          '<span style="font-size:0.7rem;color:var(--text2);font-family:var(--font-mono)">' + formatMs(test.durationMs || 0) + '</span>' +
          '<span class="suite-toggle' + (shouldExpand ? ' open' : '') + '">▶</span>' +
        '</div>' +
      '</div>' +
      '<div class="test-detail-body' + (shouldExpand ? ' open' : '') + '" id="' + detailId + '">' +
        errorHtml + renderTestAIInsight(test) + renderStepsTable(steps, detailId) + ssGalleryHtml + videoHtml +
      '</div>' +
    '</div>';
  }

  function renderSuiteBlocks(sourceTests, containerId, expandFailed) {
    if (expandFailed === undefined) expandFailed = false;
    var features = buildBddHierarchy(sourceTests);
    if (features.length === 0) {
      document.getElementById(containerId).innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎯</div><div class="empty-state-title">No features here</div><div class="empty-state-msg">No tests match the current filters.</div></div>';
      return;
    }
    var html = features.map(function(feature, fi) {
      var passed = feature.scenarios.filter(function(s) { return s.status === 'passed'; }).length;
      var failed = feature.scenarios.filter(function(s) { return s.status === 'failed'; }).length;
      var skipped = feature.scenarios.filter(function(s) { return s.status === 'skipped'; }).length;
      var total = feature.scenarios.length;
      var passRate = total > 0 ? Math.round((passed / total) * 100) : 0;
      var shouldOpen = expandFailed && failed > 0;
      var scenarioBlocks = feature.tests.map(function(test, ti) {
        return renderTestDetailBlock(test, 'feat' + fi + '-sc' + ti, expandFailed);
      }).join('');
      return '<div class="suite-block ' + (failed > 0 ? 'suite-failed' : 'suite-passed') + '">' +
        '<div class="suite-header" onclick="toggleSuite(this)">' +
          '<div class="suite-header-left">' +
            '<span class="suite-toggle ' + (shouldOpen ? 'open' : '') + '">▶</span>' +
            '<div style="min-width:0">' +
              '<div class="suite-name"><span class="bdd-label bdd-feature" style="margin-right:6px">Feature</span>' + escHtml(feature.name) + '</div>' +
              '<div class="suite-file">' + escHtml(feature.file) + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="suite-header-right">' +
            '<span class="badge badge-neutral">' + total + ' scenarios</span>' +
            '<span class="badge badge-pass">✓ ' + passed + '</span>' +
            (failed > 0 ? '<span class="badge badge-fail">✗ ' + failed + '</span>' : '') +
            (skipped > 0 ? '<span class="badge badge-skip">– ' + skipped + '</span>' : '') +
            '<span class="badge badge-neutral">' + passRate + '%</span>' +
            '<span style="font-size:0.68rem;color:var(--text3);font-family:var(--font-mono)">' + formatMs(feature.duration) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="suite-body ' + (shouldOpen ? 'open' : '') + '">' + scenarioBlocks + '</div>' +
      '</div>';
    }).join('');
    document.getElementById(containerId).innerHTML = html;
  }

  function renderFlatRows(sourceTests, containerId, statusFilter) {
    const rows = sortByDurationDesc(sourceTests)
      .filter(t => statusFilter === "failed" ? (t.status === "failed" || t.status === "timedOut") : t.status === statusFilter)
      .map((test, idx) => {
        const ns = test.status === "timedOut" ? "failed" : test.status;
        const galleryId = containerId + '-gallery-' + idx;
        return '<div class="suite-block ' + (ns === "failed" ? "suite-failed" : "suite-passed") + '">' +
          '<div class="suite-header" style="cursor:default">' +
            '<div class="suite-header-left"><span class="status-icon ' + statusClass(ns) + '">' + statusSymbol(ns) + '</span><span class="suite-name">' + escHtml(test.fullName) + '</span></div>' +
            '<div class="suite-header-right"><span class="badge ' + (ns === "failed" ? "badge-fail" : ns === "skipped" ? "badge-skip" : "badge-pass") + '">' + formatMs(test.durationMs || 0) + '</span></div>' +
          '</div>' +
          (ns === "failed" && test.errorMessage
            ? '<div style="padding:0.6rem 0.9rem;border-top:1px solid var(--border)">' +
              '<div class="test-error"><button class="copy-btn" onclick="copyToClipboard(this.nextElementSibling.textContent, this)">Copy</button><pre>' + escHtml(test.errorMessage) + '</pre></div>' +
              renderCodeSnippet(test.errorSnippet) + '</div>'
            : '') +
          (test.artifacts && ((test.artifacts.screenshots || []).length > 0 || (test.artifacts.videos || []).length > 0)
            ? '<div style="padding:0 0.9rem 0.6rem">' + renderTestLevelArtifacts(test, galleryId) + '</div>'
            : '') +
          '</div>';
      }).join("");
    document.getElementById(containerId).innerHTML = rows ||
      '<div class="empty-state"><div class="empty-state-icon">' + (statusFilter === 'failed' ? '🎉' : '⏭') + '</div>' +
      '<div class="empty-state-title">No ' + statusFilter + ' tests</div>' +
      '<div class="empty-state-msg">' + (statusFilter === 'failed' ? 'Great — no failures!' : 'Nothing here.') + '</div></div>';
  }

  function renderSlow() {
    const slow = sortByDurationDesc(tests).slice(0, 10);
    if (slow.length === 0) {
      document.getElementById("slowContainer").innerHTML = '<div class="empty-state"><div class="empty-state-icon">⏱</div><div class="empty-state-title">No test data</div></div>';
      return;
    }
    const max = slow[0].durationMs || 1;
    document.getElementById("slowContainer").innerHTML = slow.map((test, idx) => {
      const ns = test.status === "timedOut" ? "failed" : test.status;
      return '<div class="slow-item">' +
        '<div class="slow-rank">#' + (idx + 1) + '</div>' +
        '<div class="slow-title"><span class="status-icon ' + statusClass(ns) + '" style="margin-right:6px">' + statusSymbol(ns) + '</span>' + escHtml(test.fullName) + '</div>' +
        '<div class="slow-bar-wrap"><div class="slow-bar" style="width:' + Math.max(4, Math.round(((test.durationMs || 0) / max) * 100)) + '%"></div></div>' +
        '<div class="slow-dur">' + formatMs(test.durationMs || 0) + '</div>' +
        '</div>';
    }).join("");
  }

  function renderScreenshotsTab() {
    var container = document.getElementById('screenshotsContainer');
    if (!container) return;
    var allItems = [];
    for (var i = 0; i < tests.length; i++) {
      var t = tests[i];
      var ss = (t.artifacts && t.artifacts.screenshots) || [];
      for (var j = 0; j < ss.length; j++) {
        allItems.push({ src: ss[j], testName: t.title || t.fullName, file: t.file || '', status: t.status, index: allItems.length });
      }
    }
    if (allItems.length === 0) {
      container.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">📸</div><div class="empty-state-title">No screenshots</div><div class="empty-state-msg">No test screenshots were captured in this run.</div></div>';
      return;
    }
    var galleryPayload = encodeURIComponent(JSON.stringify(allItems.map(function(item, idx) { return { type: 'image', src: item.src, label: item.testName + ' (' + (idx + 1) + ')' }; })));
    container.innerHTML = allItems.map(function(item, idx) {
      var ns = item.status === 'timedOut' ? 'failed' : item.status;
      return '<div class="media-card" onclick="openScreenshotGalleryFromEl(this.querySelector('img'))">' +
        '<img data-gallery-items="' + galleryPayload + '" data-gallery-index="' + idx + '" src="' + escHtml(normalizeMediaPath(item.src)) + '" alt="screenshot" loading="lazy" />' +
        '<div class="media-card-info">' +
          '<div class="media-card-title"><span class="status-icon ' + statusClass(ns) + '" style="margin-right:4px;font-size:0.65rem">' + statusSymbol(ns) + '</span>' + escHtml(item.testName) + '</div>' +
          '<div class="media-card-sub">' + escHtml(item.file) + '</div>' +
        '</div></div>';
    }).join('');
  }

  function renderVideosTab() {
    var container = document.getElementById('videosContainer');
    if (!container) return;
    var allItems = [];
    for (var i = 0; i < tests.length; i++) {
      var t = tests[i];
      var vids = (t.artifacts && t.artifacts.videos) || [];
      for (var j = 0; j < vids.length; j++) {
        allItems.push({ src: vids[j], testName: t.title || t.fullName, file: t.file || '', status: t.status });
      }
    }
    if (allItems.length === 0) {
      container.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">🎬</div><div class="empty-state-title">No videos</div><div class="empty-state-msg">No test videos were captured in this run.</div></div>';
      return;
    }
    container.innerHTML = allItems.map(function(item) {
      var ns = item.status === 'timedOut' ? 'failed' : item.status;
      return '<div class="media-card">' +
        '<video src="' + escHtml(normalizeMediaPath(item.src)) + '" controls preload="metadata"></video>' +
        '<div class="media-card-info">' +
          '<div class="media-card-title"><span class="status-icon ' + statusClass(ns) + '" style="margin-right:4px;font-size:0.65rem">' + statusSymbol(ns) + '</span>' + escHtml(item.testName) + '</div>' +
          '<div class="media-card-sub">' + escHtml(item.file) + '</div>' +
        '</div></div>';
    }).join('');

  function countAllScreenshots() {
    var count = 0;
    for (var i = 0; i < tests.length; i++) {
      count += ((tests[i].artifacts && tests[i].artifacts.screenshots) || []).length;
    }
    return count;
  }
  function countAllVideos() {
    var count = 0;
    for (var i = 0; i < tests.length; i++) {
      count += ((tests[i].artifacts && tests[i].artifacts.videos) || []).length;
    }
    return count;
  }

  function renderTabs() {
    const failedCount = tests.filter(t => t.status === "failed" || t.status === "timedOut").length;
    const ssCount = countAllScreenshots();
    const vidCount = countAllVideos();
    const tabs = [
      { id: "all", label: "All Features", count: tests.length },
      { id: "failed", label: "Failed", count: failedCount },
      { id: "passed", label: "Passed", count: tests.filter(t => t.status === "passed").length },
      { id: "skipped", label: "Skipped", count: tests.filter(t => t.status === "skipped").length },
      { id: "slow", label: "Slowest", count: Math.min(10, tests.length) },
      { id: "screenshots", label: "📸 Screenshots", count: ssCount },
      { id: "videos", label: "🎬 Videos", count: vidCount },
      { id: "healing", label: "🩹 Healing", count: healingPayloads.length }
    ];
    document.getElementById("mainTabs").innerHTML = tabs.map((tab, idx) =>
      '<button class="tab-btn ' + (idx === 0 ? "active" : "") + '" data-tab="' + tab.id + '">' +
      tab.label + ' <span class="tab-count">' + tab.count + '</span></button>'
    ).join("");
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + btn.getAttribute('data-tab')).classList.add('active');
        btn.classList.add('active');
      });
    });
  }

  function applyFilters() {
    const query = (document.getElementById('search-input').value || '').toLowerCase().trim();
    const activeStatuses = window.__activeStatuses || new Set(['all']);
    const sc = window.__scopeFilter || 'all';
    var matchCount = 0;
    document.querySelectorAll('#suitesContainer .test-detail-block').forEach(function(row) {
      const st = row.getAttribute('data-status');
      const matchStatus = activeStatuses.has('all') || activeStatuses.has(st);
      const matchScope = sc === 'all' || row.getAttribute('data-scope') === sc;
      const matchQuery = !query || (row.textContent || '').toLowerCase().includes(query);
      var show = matchStatus && matchScope && matchQuery;
      row.style.display = show ? '' : 'none';
      if (show) matchCount++;
    });
    document.querySelectorAll('#suitesContainer .suite-block').forEach(function(suite) {
      suite.style.display = suite.querySelectorAll('.test-detail-block:not([style*="display: none"])').length === 0 ? 'none' : '';
    });
    // Search highlighting
    highlightSearchMatches(query);
    // Result count
    var countEl = document.getElementById('search-result-count');
    if (countEl) countEl.textContent = query ? matchCount + ' result' + (matchCount !== 1 ? 's' : '') : '';
  }

  function highlightSearchMatches(query) {
    document.querySelectorAll('.search-highlight').forEach(function(el) {
      var parent = el.parentNode;
      parent.replaceChild(document.createTextNode(el.textContent), el);
      parent.normalize();
    });
    if (!query) return;
    document.querySelectorAll('#suitesContainer .test-detail-block:not([style*="display: none"]) .suite-name').forEach(function(nameEl) {
      var text = nameEl.textContent || '';
      var lower = text.toLowerCase();
      var idx = lower.indexOf(query);
      if (idx === -1) return;
      nameEl.innerHTML = escHtml(text.slice(0, idx)) + '<span class="search-highlight">' + escHtml(text.slice(idx, idx + query.length)) + '</span>' + escHtml(text.slice(idx + query.length));
    });
  }

  var _searchDebounce = null;
  function bindFilters() {
    window.__activeStatuses = new Set(['all']);
    window.__scopeFilter = 'all';
    document.getElementById('search-input').addEventListener('input', function() {
      clearTimeout(_searchDebounce);
      _searchDebounce = setTimeout(applyFilters, 180);
    });
    document.querySelectorAll('.filter-btn:not(.scope-btn)').forEach(btn => {
      btn.addEventListener('click', () => {
        var filter = btn.getAttribute('data-filter') || 'all';
        if (filter === 'all') {
          window.__activeStatuses = new Set(['all']);
          document.querySelectorAll('.filter-btn:not(.scope-btn)').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        } else {
          window.__activeStatuses.delete('all');
          document.querySelectorAll('.filter-btn[data-filter="all"]:not(.scope-btn)').forEach(b => b.classList.remove('active'));
          if (window.__activeStatuses.has(filter)) {
            window.__activeStatuses.delete(filter);
            btn.classList.remove('active');
          } else {
            window.__activeStatuses.add(filter);
            btn.classList.add('active');
          }
          if (window.__activeStatuses.size === 0) {
            window.__activeStatuses = new Set(['all']);
            document.querySelector('.filter-btn[data-filter="all"]:not(.scope-btn)').classList.add('active');
          }
        }
        applyFilters();
      });
    });
    document.querySelectorAll('.scope-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        window.__scopeFilter = btn.getAttribute('data-scope') || 'all';
        document.querySelectorAll('.scope-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
      });
    });
  }

  window.expandAllSuites = function() {
    document.querySelectorAll('.suite-body').forEach(b => b.classList.add('open'));
    document.querySelectorAll('.suite-toggle').forEach(t => t.classList.add('open'));
  };
  window.collapseAllSuites = function() {
    document.querySelectorAll('.suite-body').forEach(b => b.classList.remove('open'));
    document.querySelectorAll('.suite-toggle').forEach(t => t.classList.remove('open'));
  };
  window.jumpToFailed = function() {
    var btn = document.querySelector('.tab-btn[data-tab="failed"]');
    if (btn) { btn.click(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
  };
  window.toggleSuite = function(header) {
    const body = header.nextElementSibling;
    const toggle = header.querySelector('.suite-toggle');
    if (!body || !toggle) return;
    body.classList.toggle('open');
    toggle.classList.toggle('open');
  };
  window.toggleTestDetail = function(header) {
    var body = header.nextElementSibling;
    var toggle = header.querySelector('.suite-toggle');
    if (!body) return;
    body.classList.toggle('open');
    if (toggle) toggle.classList.toggle('open');
  };
  window.toggleScreenshotGallery = function(button) {
    const panel = document.getElementById(button.getAttribute('data-target'));
    if (!panel) return;
    panel.classList.toggle('open');
    const isOpen = panel.classList.contains('open');
    const total = panel.querySelectorAll('img').length;
    button.textContent = isOpen ? 'Hide screenshots (' + total + ')' : 'Show all screenshots (' + total + ')';
  };

  // Gallery
  function stopGalleryPlay() {
    if (galleryState.timer) { clearTimeout(galleryState.timer); galleryState.timer = null; }
    const btn = document.getElementById('galleryPlay');
    if (btn) btn.textContent = '▶ Play';
  }
  function renderGalleryFrame() {
    if (!galleryState.items.length) return;
    const image = document.getElementById('galleryImage');
    const video = document.getElementById('galleryVideo');
    const item = galleryState.items[galleryState.index];
    const src = normalizeMediaPath((item && item.src) || '');
    if ((item && item.type) === 'video') {
      image.style.display = 'none'; video.style.display = 'block';
      if (video.src !== src) video.src = src;
    } else {
      video.pause(); video.style.display = 'none'; image.style.display = 'block'; image.src = src;
    }
    document.getElementById('galleryCounter').textContent = (galleryState.index + 1) + ' / ' + galleryState.items.length;
    document.getElementById('galleryTitle').textContent = (item && item.label) ? item.label : (galleryState.title || 'Gallery');
    document.getElementById('galleryPrev').disabled = galleryState.index <= 0;
    document.getElementById('galleryNext').disabled = galleryState.index >= galleryState.items.length - 1;
  }
  function openGallery(items, index, title) {
    if (!Array.isArray(items) || items.length === 0) return;
    galleryState.items = items;
    galleryState.index = Math.max(0, Math.min(index, items.length - 1));
    galleryState.title = title || 'Gallery';
    document.getElementById('galleryOverlay').classList.add('open');
    renderGalleryFrame();
  }
  function closeGallery() {
    stopGalleryPlay();
    document.getElementById('galleryVideo').pause();
    document.getElementById('galleryOverlay').classList.remove('open');
  }
  function nextGallery() { if (galleryState.index < galleryState.items.length - 1) { galleryState.index++; renderGalleryFrame(); } }
  function prevGallery() { if (galleryState.index > 0) { galleryState.index--; renderGalleryFrame(); } }
  function playNextInSequence() {
    if (galleryState.index >= galleryState.items.length - 1) { stopGalleryPlay(); return; }
    galleryState.index++;
    renderGalleryFrame();
    const item = galleryState.items[galleryState.index];
    galleryState.timer = setTimeout(playNextInSequence, (item && item.type === 'video') ? 4500 : 1600);
  }
  function bindGalleryControls() {
    document.getElementById('galleryClose').addEventListener('click', closeGallery);
    document.getElementById('galleryNext').addEventListener('click', nextGallery);
    document.getElementById('galleryPrev').addEventListener('click', prevGallery);
    document.getElementById('galleryPlay').addEventListener('click', () => {
      if (galleryState.timer) { stopGalleryPlay(); return; }
      if (!galleryState.items.length) return;
      document.getElementById('galleryPlay').textContent = '⏹ Stop';
      playNextInSequence();
    });
    document.getElementById('galleryOverlay').addEventListener('click', e => { if (e.target && e.target.id === 'galleryOverlay') closeGallery(); });
    document.addEventListener('keydown', e => {
      if (!document.getElementById('galleryOverlay').classList.contains('open')) return;
      if (e.key === 'Escape') closeGallery();
      if (e.key === 'ArrowRight') nextGallery();
      if (e.key === 'ArrowLeft') prevGallery();
    });
  }
  window.openScreenshotGalleryFromEl = function(img) {
    if (!img) return;
    const encoded = img.getAttribute('data-gallery-items') || '';
    const parsed = encoded ? JSON.parse(decodeURIComponent(encoded)) : [];
    const items = Array.isArray(parsed) ? parsed.map(e => typeof e === 'string' ? { type: 'image', src: e, label: 'Screenshot' } : e) : [];
    openGallery(items, Number(img.getAttribute('data-gallery-index') || '0'), 'Screenshot Gallery');
  };

  function renderExecutiveSummary() {
    var section = document.getElementById('exec-summary-section');
    if (!section) return;
    var total = summary.total || 0;
    var passed = summary.passed || 0;
    var failed = (summary.failed || 0) + (summary.timedOut || 0);
    var skipped = summary.skipped || 0;
    var flaky = summary.flaky || 0;
    var pct = total > 0 ? Math.round((passed / total) * 100) : 0;
    var avgMs = summary.averageDurationMs || (total > 0 ? Math.round((summary.durationMs || 0) / total) : 0);

    // Health indicator
    var healthClass = 'exec-health-good';
    var healthText = 'Healthy';
    if (pct < 70) { healthClass = 'exec-health-bad'; healthText = 'Critical'; }
    else if (pct < 90 || flaky > 0) { healthClass = 'exec-health-warn'; healthText = 'Needs Attention'; }

    // Narrative
    var narrative = 'This test run executed <strong>' + total + '</strong> test' + (total !== 1 ? 's' : '') + ' in <strong>' + formatMs(summary.durationMs || 0) + '</strong>. ';
    if (failed === 0) { narrative += 'All tests passed successfully — the suite is in good health.'; }
    else { narrative += '<strong>' + failed + '</strong> test' + (failed !== 1 ? 's' : '') + ' failed, resulting in a <strong>' + pct + '%</strong> pass rate.'; }
    if (flaky > 0) { narrative += ' <strong>' + flaky + '</strong> flaky test' + (flaky !== 1 ? 's were' : ' was') + ' detected.'; }

    // Top failures
    var failedTests = tests.filter(function(t) { return t.status === 'failed' || t.status === 'timedOut'; }).slice(0, 5);
    var failuresHtml = '';
    if (failedTests.length > 0) {
      failuresHtml = '<div style="margin-top:0.5rem"><div style="font-size:0.72rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.35rem">Top Failures</div>' +
        '<ul class="exec-top-failures">' +
        failedTests.map(function(t) {
          return '<li><span class="status-icon status-failed-icon" style="font-size:0.65rem">✗</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(t.title || t.fullName) + '</span></li>';
        }).join('') +
        '</ul></div>';
    }

    section.innerHTML =
      '<div class="section-header"><div class="section-title">Executive Summary</div><span class="exec-health-indicator ' + healthClass + '">' + healthText + '</span></div>' +
      '<div class="exec-summary">' +
        '<div class="exec-left">' +
          '<div class="exec-narrative">' + narrative + '</div>' +
          failuresHtml +
        '</div>' +
        '<div class="exec-right">' +
          '<div class="exec-metric"><div class="exec-metric-value" style="color:var(--pass)">' + pct + '%</div><div class="exec-metric-label">Pass Rate</div></div>' +
          '<div class="exec-metric"><div class="exec-metric-value">' + formatMs(avgMs) + '</div><div class="exec-metric-label">Avg Duration</div></div>' +
          '<div class="exec-metric"><div class="exec-metric-value" style="color:var(--fail)">' + failed + '</div><div class="exec-metric-label">Failures</div></div>' +
          (flaky > 0 ? '<div class="exec-metric"><div class="exec-metric-value" style="color:var(--flaky)">' + flaky + '</div><div class="exec-metric-label">Flaky</div></div>' : '') +
        '</div>' +
      '</div>';
  }

  function renderHealing() {
    var el = document.getElementById('healingContainer');
    if (!el) return;
    if (!healingPayloads || healingPayloads.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🩹</div><div class="empty-state-title">No healing suggestions</div><div class="empty-state-msg">Enable AI analysis to generate healing suggestions for failed tests.</div></div>';
      return;
    }
    var cardsHtml = healingPayloads.map(function(p) {
      var confPct = Math.round((p.confidence || 0) * 100);
      var confColor = confPct >= 70 ? 'var(--pass)' : confPct >= 40 ? 'var(--flaky)' : 'var(--fail)';
      var patchHtml = p.suggestedPatch
        ? '<div style="margin-top:0.6rem"><div style="font-size:0.68rem;font-weight:700;color:var(--text3);margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.06em">Suggested Patch</div>' +
          '<pre style="font-size:0.7rem;background:#0d1117;padding:0.55rem 0.75rem;border-radius:6px;border:1px solid var(--border);color:#a5d6ff;white-space:pre-wrap;word-break:break-word;font-family:var(--font-mono)">' + escHtml(p.suggestedPatch) + '</pre></div>'
        : '';
      var locatorsHtml = (p.candidateLocators && p.candidateLocators.length > 0)
        ? '<div style="margin-top:0.38rem;font-size:0.71rem;color:var(--text3)"><span style="font-weight:600">Candidates:</span> ' +
          p.candidateLocators.map(function(l) { return '<code style="background:var(--bg);padding:1px 6px;border-radius:4px;font-size:0.68rem;font-family:var(--font-mono);color:var(--accent)">' + escHtml(l) + '</code>'; }).join(' · ') + '</div>'
        : '';
      return '<div style="background:var(--bg3);border-radius:var(--radius-sm);padding:0.9rem 1.05rem;border:1px solid var(--border)">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:0.4rem">' +
          '<div style="flex:1;min-width:0">' +
            '<div style="font-size:0.83rem;font-weight:700;color:var(--text1);margin-bottom:0.12rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(p.testName) + '</div>' +
            '<div style="font-size:0.69rem;color:var(--text3);font-family:var(--font-mono)">' + escHtml(p.file) + (p.stepName ? ' · ' + escHtml(p.stepName) : '') + '</div>' +
          '</div>' +
          '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">' +
            '<span class="badge badge-neutral">' + escHtml(p.actionType || 'investigate') + '</span>' +
            '<span style="font-size:0.74rem;font-weight:700;color:' + confColor + '">' + confPct + '%</span>' +
          '</div>' +
        '</div>' +
        '<div style="font-size:0.79rem;color:var(--text2);line-height:1.6;margin-bottom:0.32rem">' + escHtml(p.reasoning) + '</div>' +
        locatorsHtml + patchHtml +
        '</div>';
    }).join('');

    var mdSection = '';
    if (healingMarkdown) {
      mdSection = '<div style="background:var(--bg3);border-radius:var(--radius-sm);padding:0.9rem 1.05rem;border:1px solid var(--border)">' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:0.5rem">' +
          '<div style="font-size:0.83rem;font-weight:700;color:var(--text1)">📄 healing.md</div>' +
          '<button id="healingMdToggle" class="btn-sm" style="font-size:0.68rem;padding:2px 9px">Show</button>' +
          '<button id="healingMdDownload" class="btn-sm btn-accent" style="font-size:0.68rem;padding:2px 9px">↓ Download</button>' +
        '</div>' +
        '<pre id="healingMdContent" class="healing-md-pre">' + escHtml(healingMarkdown) + '</pre>' +
      '</div>';
    }
    el.innerHTML = '<div style="display:flex;flex-direction:column;gap:0.55rem">' + cardsHtml + mdSection + '</div>';

    var toggleBtn = document.getElementById('healingMdToggle');
    var dlBtn = document.getElementById('healingMdDownload');
    var mdPre = document.getElementById('healingMdContent');
    if (toggleBtn && mdPre) {
      toggleBtn.addEventListener('click', function() {
        var visible = window.getComputedStyle(mdPre).display !== 'none';
        mdPre.style.display = visible ? 'none' : 'block';
        toggleBtn.textContent = visible ? 'Show' : 'Hide';
      });
    }
    if (dlBtn) {
      dlBtn.addEventListener('click', function() {
        var blob = new Blob([healingMarkdown], { type: 'text/markdown' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a'); a.href = url; a.download = 'healing.md';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });
    }
  }

  function generateDocumentation() {
    var features = buildBddHierarchy(tests);
    var lines = [];
    lines.push('# ' + (report.title || 'Test Suite') + ' — Documentation');
    lines.push('');
    lines.push('> Auto-generated from test results on ' + new Date(report.generatedAt).toLocaleString());
    lines.push('');
    lines.push('## Overview');
    lines.push('');
    lines.push('| Metric | Value |');
    lines.push('|--------|-------|');
    lines.push('| Total Tests | ' + (summary.total || 0) + ' |');
    lines.push('| Passed | ' + (summary.passed || 0) + ' |');
    lines.push('| Failed | ' + ((summary.failed || 0) + (summary.timedOut || 0)) + ' |');
    lines.push('| Skipped | ' + (summary.skipped || 0) + ' |');
    lines.push('| Duration | ' + formatMs(summary.durationMs || 0) + ' |');
    lines.push('| Pass Rate | ' + passPercent() + '% |');
    lines.push('');
    lines.push('---');
    lines.push('');
    lines.push('## Features');
    lines.push('');
    for (var i = 0; i < features.length; i++) {
      var f = features[i];
      var fIcon = f.status === 'passed' ? '✅' : f.status === 'failed' ? '❌' : '⏭️';
      lines.push('### ' + fIcon + ' ' + f.name);
      lines.push('');
      lines.push('**File:** `' + f.file + '`  ');
      lines.push('**Duration:** ' + formatMs(f.duration) + '  ');
      lines.push('**Scenarios:** ' + f.scenarios.length);
      lines.push('');
      for (var j = 0; j < f.scenarios.length; j++) {
        var sc = f.scenarios[j];
        var scIcon = sc.status === 'passed' ? '✓' : sc.status === 'failed' ? '✗' : '–';
        lines.push('#### ' + scIcon + ' ' + sc.name + ' (' + formatMs(sc.duration) + ')');
        lines.push('');
        if (sc.steps.length > 0) {
          lines.push('| Step | Status | Duration |');
          lines.push('|------|--------|----------|');
          for (var k = 0; k < sc.steps.length; k++) {
            var step = sc.steps[k];
            var stepIcon = step.status === 'passed' ? '✓' : '✗';
            lines.push('| ' + stepIcon + ' ' + (step.name || '').replace(/[|]/g, '\|') + ' | ' + step.status + ' | ' + formatMs(step.duration) + ' |');
          }
          lines.push('');
        }
        if (sc.status === 'failed' && sc.test && sc.test.errorMessage) {
          lines.push('**Error:** `' + (sc.test.errorMessage || '').split('\n')[0] + '`');
          lines.push('');
        }
      }
      lines.push('---');
      lines.push('');
    }
    return lines.join('\n');

  }

  function openDocModal() {
    var content = generateDocumentation();
    document.getElementById('docModalContent').textContent = content;
    document.getElementById('docModalOverlay').classList.add('open');
  }
  function closeDocModal() {
    document.getElementById('docModalOverlay').classList.remove('open');
  }
  function bindDocModal() {
    document.getElementById('btnGenDoc').addEventListener('click', openDocModal);
    document.getElementById('docModalClose').addEventListener('click', closeDocModal);
    document.getElementById('docModalOverlay').addEventListener('click', function(e) { if (e.target.id === 'docModalOverlay') closeDocModal(); });
    document.getElementById('docCopyBtn').addEventListener('click', function() {
      var text = document.getElementById('docModalContent').textContent || '';
      navigator.clipboard.writeText(text).then(function() {
        document.getElementById('docCopyBtn').textContent = '✓ Copied!';
        setTimeout(function() { document.getElementById('docCopyBtn').textContent = '📋 Copy'; }, 1800);
      });
    });
    document.getElementById('docDownloadBtn').addEventListener('click', function() {
      var text = document.getElementById('docModalContent').textContent || '';
      var blob = new Blob([text], { type: 'text/markdown' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href = url; a.download = 'test-documentation.md';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && document.getElementById('docModalOverlay').classList.contains('open')) closeDocModal();
    });
  }

  function renderFooter() {
    document.getElementById('footer').innerHTML =
      '<div>Generated by <a class="footer-link" href="https://github.com/pankajnakhat/playwright-glossy-ai-reporter" target="_blank" rel="noreferrer">Playwright Glossy AI Reporter</a></div>' +
      '<div>' + new Date(report.generatedAt).toLocaleString() + ' · ' + tests.length + ' tests · ' + formatMs(summary.durationMs || 0) + '</div>';
  }

  // Scroll to top
  const scrollTopBtn = document.getElementById('scrollTopBtn');
  window.addEventListener('scroll', function() {
    scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
  });
  scrollTopBtn.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });

  // Init
  renderTop();
  renderEnvInfo();
  renderProgressBar();
  renderStats();
  renderBddSummary();
  renderAI();
  renderTabs();
  renderHealing();
  renderSuiteBlocks(sortByDurationDesc(tests), 'suitesContainer', true);
  renderFlatRows(tests, 'failedContainer', 'failed');
  renderFlatRows(tests, 'passedContainer', 'passed');
  renderFlatRows(tests, 'skippedContainer', 'skipped');
  renderSlow();
  renderScreenshotsTab();
  renderVideosTab();
  renderExecutiveSummary();
  bindFilters();
  bindGalleryControls();
  bindDocModal();
  renderFooter();

  document.getElementById('btnExportPdf').addEventListener('click', function() { window.print(); });
</script>
</body>
</html>
