name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ─── Unit tests ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test

  # ─── JS ES6 example — API tests ─────────────────────────────────────────────
  example-js-api:
    name: JS ES6 Demo — API Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build reporter
        run: npm ci && npm run build

      - name: Install example dependencies
        working-directory: examples/js-es6-demo
        run: npm ci

      - name: Run API tests
        working-directory: examples/js-es6-demo
        run: npx playwright test --project=api

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: js-es6-api-report
          path: examples/js-es6-demo/spec-doc-report/
          retention-days: 7

  # ─── JS ES6 example — UI tests (no AI key needed) ───────────────────────────
  example-js-ui:
    name: JS ES6 Demo — UI Tests (SauceDemo)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build reporter
        run: npm ci && npm run build

      - name: Install example dependencies
        working-directory: examples/js-es6-demo
        run: npm ci

      - name: Install Playwright browsers (chromium)
        working-directory: examples/js-es6-demo
        run: npx playwright install chromium --with-deps

      - name: Run UI tests
        working-directory: examples/js-es6-demo
        # AI analysis is skipped when ANTHROPIC_API_KEY is not set — report still generates
        # Intentional failure tests use test.fail() so Playwright counts them as passing when they fail
        run: npx playwright test --project=chromium

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: js-es6-ui-report
          path: examples/js-es6-demo/spec-doc-report/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: js-es6-ui-test-results
          path: examples/js-es6-demo/test-results/
          retention-days: 7

  # ─── Auto-release on merge to main ──────────────────────────────────────────
  auto-release:
    name: Bump version & publish to npm
    runs-on: ubuntu-latest
    needs: [unit-tests, example-js-api, example-js-ui]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install & build
        run: npm ci && npm run build

      - name: Bump patch version & tag
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push
          git push --tags

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Publish to npm (on manual version tags only) ────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: unit-tests
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install & build
        run: npm ci && npm run build

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
